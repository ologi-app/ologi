name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - runner: macos-14      # arm64
            arch: arm64
          - runner: macos-13      # intel
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PortAudio
        run: brew install portaudio

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./...

      - name: Compute version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          CGO_ENABLED: "1"
        run: |
          go build \
            -ldflags "-X main.version=${{ steps.ver.outputs.version }}" \
            -o ologi \
            ./cmd/ologi

      # Ad-hoc sign — gives the binary a stable identity for TCC
      # (mic + accessibility prompts) without an Apple Developer cert.
      # Real Developer ID signing + notarytool is still a TODO; brew
      # install via curl avoids the quarantine flag, so Gatekeeper
      # doesn't block this path. Direct GitHub Releases downloads will
      # still need `xattr -d com.apple.quarantine`.
      - name: Ad-hoc sign
        run: codesign --sign - --force --options runtime ./ologi

      - name: Package tarball
        run: |
          NAME="ologi-${{ steps.ver.outputs.version }}-darwin-${{ matrix.arch }}"
          mkdir -p dist
          tar czf "dist/${NAME}.tar.gz" ologi
          shasum -a 256 "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
