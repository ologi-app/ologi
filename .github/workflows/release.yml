name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            os: darwin
            arch: arm64
          - runner: macos-13
            os: darwin
            arch: amd64
          - runner: ubuntu-22.04
            os: linux
            arch: amd64
          - runner: ubuntu-22.04-arm
            os: linux
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PortAudio (macOS)
        if: matrix.os == 'darwin'
        run: brew install portaudio

      - name: Install build deps (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 portaudio19-dev \
            libx11-dev libxi-dev libxtst-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./...

      - name: Compute version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          CGO_ENABLED: "1"
        run: |
          go build \
            -ldflags "-X main.version=${{ steps.ver.outputs.version }}" \
            -o ologi \
            ./cmd/ologi

      # macOS only: ad-hoc sign so TCC permissions stick more reliably.
      # Hardened runtime (--options runtime) is intentionally NOT used —
      # it would block loading brew's libportaudio (Team ID mismatch).
      # Real Developer ID signing + notarytool is still a TODO; the
      # brew-install path avoids the quarantine flag.
      - name: Ad-hoc sign (macOS)
        if: matrix.os == 'darwin'
        run: codesign --sign - --force ./ologi

      - name: Package tarball
        run: |
          NAME="ologi-${{ steps.ver.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p dist
          tar czf "dist/${NAME}.tar.gz" ologi
          shasum -a 256 "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
